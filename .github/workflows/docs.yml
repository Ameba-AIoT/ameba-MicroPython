name: Build and deploy docs

on:
  push:
    branches: [main]
    paths:
      - "ports/doc/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; let an in-flight run finish instead of
# cancelling it, so Pages never serves a half-deployed site.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Sphinx
        run: pip install sphinx sphinx_rtd_theme

      - name: Build English docs
        run: sphinx-build -b html ports/doc ports/doc/_build/html

      - name: Build Chinese docs
        run: sphinx-build -b html ports/doc/zh ports/doc/_build/html/zh

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ports/doc/_build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
